<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Our Cause | Donate</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .donation-container {
            background: var(--card-bg);
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 32px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 15px;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Donation Grid */
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .amount-btn {
            background: transparent;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .amount-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .amount-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        /* Custom Amount Input */
        .custom-amount-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .currency-symbol {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-weight: 500;
            font-size: 18px;
        }

        .custom-input {
            width: 100%;
            padding: 14px 16px 14px 36px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .custom-input:focus {
            border-color: var(--primary-color);
        }

        /* Info Impact Message */
        .impact-box {
            background-color: #eff6ff;
            border-left: 4px solid var(--primary-color);
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            font-size: 14px;
            color: #1e40af;
            margin-bottom: 24px;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--20s) ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .submit-btn:hover {
            background: var(--primary-hover);
        }

        .footer-note {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 16px;
        }
    </style>
</head>
<body>

    <div class="donation-container">
        <div class="header">
            <h1>Make a Difference</h1>
            <p>Your support helps us continue our mission and build innovative open-source tools.</p>
        </div>

        <form id="donationForm" onsubmit="handleDonation(event)">
            
            <div class="section-title">Select Amount</div>
            <div class="amount-grid">
                <button type="button" class="amount-btn" onclick="selectAmount(10, this)">$10</button>
                <button type="button" class="amount-btn active" onclick="selectAmount(25, this)">$25</button>
                <button type="button" class="amount-btn" onclick="selectAmount(50, this)">$50</button>
            </div>

            <div class="section-title">Or Enter Custom Amount</div>
            <div class="custom-amount-wrapper">
                <span class="currency-symbol">$</span>
                <input type="number" id="customAmount" class="custom-input" placeholder="Other amount" min="1" step="any" oninput="handleCustomInput(this)">
            </div>

            <div class="impact-box" id="impactMessage">
                Your $25 donation helps keep our infrastructure running smoothly for a month.
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Donate $25</button>
            
            <div class="footer-note">
                Secure transaction. Thank you for your generosity!
            </div>
        </form>
    </div>

    <script>
        let selectedAmount = 25;

        // Configuration for impact tiers
        const impactTiers = {
            10: "Your $10 donation covers basic server resource maintenance.",
            25: "Your $25 donation helps keep our infrastructure running smoothly for a month.",
            50: "Your $50 donation helps fund new feature development and open tools."
        };

        function selectAmount(amount, element) {
            selectedAmount = amount;
            
            // Reset active classes
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            
            // Set active class to clicked button
            element.classList.add('active');
            
            // Clear custom input field
            document.getElementById('customAmount').value = '';
            
            // Update UI
            updateUI(amount);
        }

        function handleCustomInput(input) {
            const val = parseFloat(input.value);
            
            // Remove active classes from presets
            document.querySelectorAll('.amount-btn').forEach(btn => btn.classList.remove('active'));
            
            if (val && val > 0) {
                selectedAmount = val;
                updateUI(val);
            } else {
                selectedAmount = 0;
                updateUI(0);
            }
        }

        function updateUI(amount) {
            const submitBtn = document.getElementById('submitBtn');
            const impactBox = document.getElementById('impactMessage');
            
            if (amount > 0) {
                submitBtn.disabled = false;
                submitBtn.innerText = `Donate $${amount}`;
                
                // Dynamically update impact message based on custom or preset values
                if (impactTiers[amount]) {
                    impactBox.innerText = impactTiers[amount];
                } else {
                    impactBox.innerText = `Your custom donation of $${amount} directly backs our core developer initiatives.`;
                }
            } else {
                submitBtn.disabled = true;
                submitBtn.innerText = 'Enter an Amount';
                impactBox.innerText = 'Please select or enter an amount to see its impact.';
            }
        }

        function handleDonation(e) {
            e.preventDefault();
            if (selectedAmount <= 0) return;

            // Log or execute payment gateways here
            alert(`Proceeding to gateway with choice: $${selectedAmount}`);
            
            /* 
               Example integration hooks:
               ------------------------------------------
               1. Redirecting to custom billing api endpoint:
                  window.location.href = `/api/checkout?amount=${selectedAmount}`;
                  
               2. Directing to a crypto wallet payment flow or API payload.
            */
        }
    </script>
</body>
</html>
